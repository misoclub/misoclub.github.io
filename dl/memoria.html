<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>メモリア をダウンロード | misoclub</title>
    <meta
      name="description"
      content="メモリア 〜たいせつな日のカウントダウン〜 を App Store / Google Play からダウンロードできます。"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!--
      アプリのシェア機能などから飛ばすダウンロード専用ページ。
      iOS / Android を選んでダウンロードしてもらう。
      misoclub の他アプリ一覧へのリンク以外は置かない。
      ↓ ストアの URL を実際のものに差し替えてください（href="#" の箇所）。
    -->
    <main class="dl-page">
      <img src="../assets/logo.png" alt="misoclub" class="dl-logo" />

      <h1>メモリア 〜たいせつな日のカウントダウン〜</h1>
      <p class="dl-desc">お使いの端末を選んでダウンロード</p>

      <div class="store-badges">
        <!-- iOS / App Store -->
        <a href="#" class="appstore-badge" aria-label="App Store でダウンロード">
          <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C73.6 141.9 24 184.5 24 271.3c0 25.6 4.7 52.1 14.1 79.4 12.5 35.9 57.7 124.6 104.9 123.2 24.7-.6 42.1-17.6 74.3-17.6 31.2 0 47.4 17.6 74.7 17.6 47.6-.7 88.5-81.1 100.4-117.1-63.9-30.1-63.7-88.2-63.7-90.1zm-49.9-156c25.1-29.8 22.8-56.9 22.1-66.7-22.2 1.3-47.9 15.1-62.5 32-16.1 18.2-25.6 40.7-23.6 65.7 23.9 1.9 45.7-10.4 64-31z"
            />
          </svg>
          <span>
            <span class="l1">Download on the</span>
            <span class="l2">App Store</span>
          </span>
        </a>

        <!-- Android / Google Play -->
        <a href="#" class="google-play" aria-label="Google Play で手に入れよう">
          <img src="../assets/google-play-badge.png" alt="Google Play で手に入れよう" />
        </a>
      </div>

      <p class="dl-others">
        <a href="../apps.html">misoclub の他のアプリを見る →</a>
      </p>
    </main>
  </body>
</html>
